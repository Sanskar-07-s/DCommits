name: Weekly Summary Generator

on:
  schedule:
    - cron: '0 15 * * 0' # Every Sunday at 15:00 UTC (08:30 PM IST)
  workflow_dispatch:

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Weekly Summary Script
        run: python scripts/weekly_summary.py

      - name: Commit and Push Changes
        run: |
          MESSAGES=("docs: weekly summary update 📊" "feat: aggregate weekly productivity stats" "docs: finalized weekly dev report" "chore: weekly log maintenance")
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          git config --global user.name "Sanskar"
          git config --global user.email "sanskardhat6@gmail.com"
          git add summaries/
          git commit -m "$RANDOM_MSG" || echo "No changes to commit"
          git push
